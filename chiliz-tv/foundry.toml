[profile.default]
src = "src"
out = "out"
libs = ["lib"]
no_match_coverage = "^(script|test)/"
remappings = [
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/"
]
optimizer = true
optimizer_runs = 200
solc_version = "0.8.24"

# RPC aliases for Chiliz chains. Referenced by name via `--rpc-url <alias>`.
# Combined with matching [etherscan] entries below, this registers the chain
# with forge's internal chain manager so `--chain <alias>` works without
# hitting the alloy-chains "Chain X not supported" error.
[rpc_endpoints]
chiliz_spicy = "https://spicy-rpc.chiliz.com"
chiliz_mainnet = "https://rpc.chiliz.com"

# Etherscan API configuration for Chiliz chains
[etherscan]
chiliz_spicy = { key = "${ETHERSCAN_API_KEY}", chain = 88882, url = "https://api.routescan.io/v2/network/testnet/evm/88882/etherscan" }
chiliz_mainnet = { key = "${ETHERSCAN_API_KEY}", chain = 88888, url = "https://api.routescan.io/v2/network/mainnet/evm/88888/etherscan" }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
